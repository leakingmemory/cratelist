name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build:
    name: Build and Package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release

      - name: Package binary
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mkdir -p cratelist-${VERSION}
          cp target/release/cratelist cratelist-${VERSION}/
          cp LICENSE README.md cratelist-${VERSION}/ 2>/dev/null || true
          tar -czf cratelist-${VERSION}-linux-x86_64.tar.gz cratelist-${VERSION}/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-tarball
          path: cratelist-*-linux-x86_64.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: release-tarball

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            *.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
