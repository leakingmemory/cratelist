name: Update Dependency Licenses

on:
  push:
    branches:
      - master
    paths:
      - 'Cargo.lock'
  workflow_dispatch:

jobs:
  generate-license:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build tool
        run: cargo build -r

      - name: Vendor all dependencies
        run: |
          # `cargo build` only extracts sources for the host target, so
          # platform-specific dependencies (e.g. Windows-only crates) are listed
          # in Cargo.lock but never appear in ~/.cargo/registry/src/, producing
          # bogus "No license file found" entries. `cargo vendor` materialises
          # the full source (Cargo.toml + license files) of *every* crate in
          # Cargo.lock, for all platforms, into a single directory.
          # --versioned-dirs forces "<name>-<version>" naming, which matches the
          # directory layout cratelist expects.
          cargo vendor --versioned-dirs --locked vendor

      - name: Generate DEPENDENCIES_LICENSE
        run: |
          echo "Using crates directory: vendor"
          ./target/release/cratelist Cargo.lock --license-contents vendor > DEPENDENCIES_LICENSE

          # Some crates legitimately ship without standard license files; those
          # are reported as "No license file found" but are not fatal.
          if grep -q "No license file found" DEPENDENCIES_LICENSE; then
              echo "Note: some dependencies lack standard license files:" >&2
              grep "No license file found" DEPENDENCIES_LICENSE >&2
          fi

          # Compress the license file to reduce binary size when embedded
          # We keep both the plain text and compressed files
          gzip -fk DEPENDENCIES_LICENSE

      - name: Upload DEPENDENCIES_LICENSE
        uses: actions/upload-artifact@v4
        with:
          name: license-file
          path: |
            DEPENDENCIES_LICENSE
            DEPENDENCIES_LICENSE.gz
          retention-days: 1

  commit-license:
    needs: generate-license
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download DEPENDENCIES_LICENSE
        uses: actions/download-artifact@v4
        with:
          name: license-file

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add DEPENDENCIES_LICENSE DEPENDENCIES_LICENSE.gz
          # If only the .gz file changed, skip the commit — gzip output is
          # non-deterministic and nearly always differs even when the plain
          # text content is identical.
          changed=$(git diff --cached --name-only)
          if [ "$changed" = "DEPENDENCIES_LICENSE.gz" ]; then
            echo "Only DEPENDENCIES_LICENSE.gz changed, skipping commit"
            exit 0
          fi
          if ! git diff-index --quiet HEAD; then
            git commit -m "chore: update dependency licenses"
            for i in {1..5}; do
              git pull --rebase origin master
              if git push origin master; then
                exit 0
              fi
              echo "Push failed, retrying in 5 seconds... (attempt $i)"
              sleep 5
            done
            exit 1
          else
            echo "No changes to commit"
          fi
